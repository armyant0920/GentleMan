<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei",Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
h1{text-align:center;padding:18px;font-size:1.4rem;color:#f4a261;letter-spacing:2px;background:#16213e}

/* ── Filter panel ── */
#filter-panel{background:#16213e;padding:14px 20px 10px;border-bottom:2px solid #e94560}
.filter-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:10px}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-group>label{font-size:.72rem;color:#a0a0c0;text-transform:uppercase;letter-spacing:.5px}
input[type=number],input[type=text]{background:#0f3460;border:1px solid #e94560;color:#e0e0e0;
  padding:5px 8px;border-radius:4px;font-size:.85rem;outline:none;width:120px}
select{background:#0f3460;border:1px solid #e94560;color:#e0e0e0;
  padding:5px 8px;border-radius:4px;font-size:.85rem;outline:none;cursor:pointer}
select:focus{border-color:#f4a261}
input:focus{border-color:#f4a261}
.range-pair{display:flex;align-items:center;gap:5px}
.range-pair input{width:72px}
.range-pair span{color:#666;font-size:.85rem}

/* pill multi-select */
.pill-wrap{display:flex;flex-wrap:wrap;gap:5px;max-width:420px}
.pill{background:#0f3460;border:1px solid #555;color:#c0c0d0;border-radius:14px;
  padding:3px 11px;font-size:.78rem;cursor:pointer;user-select:none;
  transition:background .15s,border-color .15s,color .15s;white-space:nowrap}
.pill:hover{border-color:#e94560;color:#fff}
.pill.active{background:#e94560;border-color:#e94560;color:#fff;font-weight:bold}

/* service-pill section */
#tag-section{background:#16213e;padding:10px 20px;border-bottom:1px solid #2a2a4a}
#tag-section>.sec-label{font-size:.75rem;color:#a0a0c0;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px}
#svc-pills{display:flex;flex-wrap:wrap;gap:5px}
#svc-pills .pill{font-size:.72rem}

/* action buttons */
.action-row{display:flex;gap:8px;align-items:center;margin-top:6px}
button.btn-action{padding:6px 18px;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-weight:bold}
#btn-reset{background:#444;color:#ccc}

/* stats */
#stats{padding:7px 20px;font-size:.8rem;color:#888;background:#1a1a2e;border-bottom:1px solid #222}

/* cards */
#cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:16px 20px}
.card{background:#16213e;border-radius:8px;overflow:hidden;border:1px solid #2a2a4a;
  transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(233,69,96,.4)}
.card-img{width:100%;height:220px;object-fit:cover;cursor:pointer}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:5px}
.card-name{font-size:1rem;font-weight:bold;color:#f4a261}
.card-meta{font-size:.78rem;color:#a0b0c0;display:flex;gap:8px;flex-wrap:wrap}
.badge{background:#0f3460;border-radius:10px;padding:2px 8px;border:1px solid #e94560;font-size:.72rem}
.badge.green{border-color:#52b788;color:#52b788}
.price-row{display:flex;gap:10px;font-size:.82rem;margin-top:4px}
.price-item{background:#0f3460;padding:4px 8px;border-radius:4px;flex:1;text-align:center}
.price-label{font-size:.7rem;color:#888;display:block}
.price-val{color:#f4a261;font-weight:bold}
.services-section{margin-top:6px}
.svc-title{font-size:.72rem;color:#888;margin-bottom:3px}
.svc-tags{display:flex;flex-wrap:wrap;gap:3px}
.svc-tag{font-size:.68rem;background:#222;border:1px solid #333;border-radius:3px;padding:1px 5px;color:#c0c0c0}
.svc-tag.highlight{border-color:#f4a261;color:#f4a261}
.extra-services{font-size:.72rem;color:#b0b0b0;margin-top:4px;line-height:1.5;white-space:pre-wrap}
.card-footer{padding:8px 12px;background:#0f3460;font-size:.72rem;color:#888;display:flex;justify-content:space-between;align-items:center}
.last-updated{color:#52b788}

/* modal */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;justify-content:center;align-items:center}
#modal.show{display:flex}
#modal img{max-width:90vw;max-height:90vh;border-radius:6px;box-shadow:0 0 40px rgba(233,69,96,.5)}
#modal-close{position:absolute;top:16px;right:24px;font-size:2rem;color:#fff;cursor:pointer;z-index:1001}
.no-results{text-align:center;padding:60px;color:#666;font-size:1.1rem;grid-column:1/-1}

// ── pill toggle ──────────────────────────────────────────────────────────────
function getActive(field) {
  return Array.from(document.querySelectorAll(`.pill[data-field="${field}"].active`))
             .map(b => b.dataset.value);
}

document.querySelectorAll(".pill").forEach(btn => {
  btn.addEventListener("click", () => {
    btn.classList.toggle("active");
    applyFilters();
  });
});

// ── render ───────────────────────────────────────────────────────────────────
function fmtDate(dt) {
  if (!dt) return "";
  // "26.03.2026 13:01:44 UTC+08:00" → "2026-03-26"
  const m = dt.match(/(\d{2})\.(\d{2})\.(\d{4})/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : dt;
}

function renderCard(r, activeSvcs) {
  const svcs = r.basic_services ? r.basic_services.split(",").map(s=>s.trim()) : [];
  const svcTags = svcs.map(s => {
    const hi = activeSvcs.length && activeSvcs.includes(s);
    return `<span class="svc-tag${hi?" highlight":""}">${s}</span>`;
  }).join("");
  return `
<div class="card">
  <img class="card-img" src="${r.thumb}" alt="${r.name}"
       loading="lazy" onclick="openModal('${r.photo}')"
       onerror="this.style.display='none'">
  <div class="card-body">
    <div class="card-name">${r.name}</div>
    <div class="card-meta">
      <span class="badge">${r.nationality||"未知"}</span>
      <span class="badge green">${r.service_type}</span>
      <span>${r.city} ${r.district}</span>
    </div>
    <div class="card-meta">
      <span>📏 ${r.height}cm</span>
      <span>⚖️ ${r.weight}kg</span>
      <span>🍑 ${r.cup}罩</span>
    </div>
    <div class="price-row">
      <div class="price-item"><span class="price-label">短鐘</span><span class="price-val">${r.short_price?'$'+r.short_price:'—'}</span></div>
      <div class="price-item"><span class="price-label">長鐘</span><span class="price-val">${r.long_price?'$'+r.long_price:'—'}</span></div>
    </div>
    <div class="services-section">
      <div class="svc-title">✅ 基本服務</div>
      <div class="svc-tags">${svcTags}</div>
    </div>
    ${r.extra_services?`<div class="services-section"><div class="svc-title">⭐ 加值服務</div><div class="extra-services">${r.extra_services}</div></div>`:""}
  </div>
  <div class="card-footer">
    <span class="last-updated">🆕 ${fmtDate(r.create_date)}</span>
    <span class="last-updated" style="color:#a0b0c0">✏️ ${fmtDate(r.last_updated)}</span>
  </div>
</div>`;
}

// ── filter ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const name      = document.getElementById("f-name").value.trim().toLowerCase();
  const maxPrice  = parseFloat(document.getElementById("f-maxprice").value) || Infinity;
  const minHeight = parseFloat(document.getElementById("f-minheight").value) || 0;
  const maxHeight = parseFloat(document.getElementById("f-maxheight").value) || Infinity;
  const minWeight = parseFloat(document.getElementById("f-minweight").value) || 0;
  const maxWeight = parseFloat(document.getElementById("f-maxweight").value) || Infinity;

  const selNat     = getActive("nat");
  const selDist    = getActive("dist");
  const selSvctype = getActive("svctype");
  const selCup     = getActive("cup");
  const selSvcs    = getActive("svc");

  const sortKey = document.getElementById("f-sort").value;

  const filtered = DATA.filter(r => {
    if (name && !r.name.toLowerCase().includes(name)) return false;
    if (selNat.length     && !selNat.includes(r.nationality))   return false;
    if (selDist.length    && !selDist.includes(r.district))      return false;
    if (selSvctype.length && !selSvctype.includes(r.service_type)) return false;
    if (selCup.length     && !selCup.includes(r.cup))            return false;
    if (r.short_price && parseFloat(r.short_price) > maxPrice)   return false;
    const h = parseFloat(r.height);
    if (r.height && (h < minHeight || h > maxHeight))            return false;
    const w = parseFloat(r.weight);
    if (r.weight && (w < minWeight || w > maxWeight))            return false;
    if (selSvcs.length) {
      const svcs = r.basic_services.split(",").map(s=>s.trim());
      if (!selSvcs.every(s => svcs.includes(s))) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    switch (sortKey) {
      case "create_desc":  return (b.create_date||"").localeCompare(a.create_date||"");
      case "create_asc":   return (a.create_date||"").localeCompare(b.create_date||"");
      case "updated_desc": return (b.last_updated||"").localeCompare(a.last_updated||"");
      case "updated_asc":  return (a.last_updated||"").localeCompare(b.last_updated||"");
      case "price_asc":    return (parseFloat(a.short_price)||Infinity) - (parseFloat(b.short_price)||Infinity);
      case "price_desc":   return (parseFloat(b.short_price)||0) - (parseFloat(a.short_price)||0);
      case "height_asc":   return (parseFloat(a.height)||0) - (parseFloat(b.height)||0);
      case "height_desc":  return (parseFloat(b.height)||0) - (parseFloat(a.height)||0);
      case "name_asc":     return a.name.localeCompare(b.name);
      default: return 0;
    }
  });

  document.getElementById("stats").textContent = `顯示 ${filtered.length} / ${DATA.length} 筆`;
  document.getElementById("cards").innerHTML = filtered.length
    ? filtered.map(r => renderCard(r, selSvcs)).join("")
    : '<div class="no-results">沒有符合條件的結果</div>';
}

function resetFilters() {
  ["f-name","f-maxprice","f-minheight","f-maxheight","f-minweight","f-maxweight"]
    .forEach(id => document.getElementById(id).value = "");
  document.getElementById("f-sort").value = "create_desc";
  document.querySelectorAll(".pill.active").forEach(b => b.classList.remove("active"));
  applyFilters();
}

// ── modal ────────────────────────────────────────────────────────────────────
function openModal(src) {
  document.getElementById("modal-img").src = src;
  document.getElementById("modal").classList.add("show");
}
function closeModal() {
  document.getElementById("modal").classList.remove("show");
}
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

["f-name","f-maxprice","f-minheight","f-maxheight","f-minweight","f-maxweight"]
  .forEach(id => document.getElementById(id).addEventListener("input", applyFilters));

applyFilters();
</script>
</body>
</html>
